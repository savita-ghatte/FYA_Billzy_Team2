{% extends "base.html" %}
{% block title %}{% if product %}Edit Product{% else %}Add Product{% endif %}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 800px;">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-box-seam text-primary me-2"></i>
                {% if product %}Edit Product{% else %}Add Product{% endif %}
            </h2>
            <p class="text-muted mb-0">Fill in the product details below.</p>
        </div>
        <a href="{{ url_for('inventory.list_products') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Inventory
        </a>
    </div>

    <!-- Form Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST">
                
                <div class="row g-3">

                    <!-- Product Name -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                        <input type="text" 
                               name="name" 
                               class="form-control" 
                               placeholder="e.g. Wireless Mouse" 
                               value="{{ product.name if product else '' }}" 
                               required>
                    </div>

                    <!-- Category & Batch -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Category</label>
                        <input type="text" 
                               name="category" 
                               class="form-control" 
                               placeholder="e.g. Electronics" 
                               value="{{ product.category if product else '' }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Batch Number</label>
                        <input type="text" 
                               name="batch" 
                               class="form-control" 
                               placeholder="e.g. BATCH-2026-01" 
                               value="{{ product.batch_no if product else '' }}">
                    </div>

                    <!-- Cost & Selling Price -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Cost Price (₹)</label>
                        <input type="number" 
                               step="0.01" 
                               name="cost" 
                               class="form-control" 
                               placeholder="0.00" 
                               value="{{ product.cost_price if product else '0' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Selling Price (₹)</label>
                        <input type="number" 
                               step="0.01" 
                               name="price" 
                               class="form-control" 
                               placeholder="0.00" 
                               value="{{ product.selling_price if product else '0' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Tax Rate (%)</label>
                        <input type="number" 
                               step="0.01" 
                               name="tax_rate" 
                               class="form-control" 
                               placeholder="18" 
                               value="{{ product.tax_rate if product else '0' }}">
                    </div>

                    <!-- Stock & Minimum Stock -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Stock Quantity</label>
                        <input type="number" 
                               name="stock" 
                               class="form-control" 
                               placeholder="100" 
                               value="{{ product.stock_qty if product else '0' }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Minimum Stock Alert</label>
                        <input type="number" 
                               name="min_stock" 
                               class="form-control" 
                               placeholder="5" 
                               value="{{ product.min_threshold if product else '5' }}">
                    </div>

                    <!-- Expiry Date -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">Expiry Date</label>
                        <input type="date" 
                               name="expiry_date" 
                               class="form-control" 
                               value="{{ product.expiry_date if product else '' }}">
                    </div>

                    <!-- Submit Buttons -->
                    <div class="col-12 text-end mt-4">
                        <a href="{{ url_for('inventory.list_products') }}" class="btn btn-light me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i> Save Product
                        </button>
                    </div>

                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
