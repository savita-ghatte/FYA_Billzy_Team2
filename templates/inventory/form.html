{% extends "base.html" %}
{% block title %}{{ "Edit" if product else "Add" }} Product{% endblock %}
{% block content %}
<h3>{{ "Edit" if product else "Add" }} Product</h3>
<form method="POST" class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Name</label>
    <input class="form-control" name="name" value="{{ product.name if product else '' }}" required>
  </div>
  
  <div class="col-md-3">
    <label class="form-label">Category</label>
    <input class="form-control" name="category" value="{{ product.category if product else '' }}">
  </div>

  <div class="col-md-3">
    <label class="form-label">Cost Price (₹)</label>
    <input class="form-control" type="number" step="0.01" name="cost_price" value="{{ product.cost_price if product else 0 }}" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Selling Price (₹)</label>
    <input class="form-control" type="number" step="0.01" name="selling_price" value="{{ product.selling_price if product else 0 }}" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Tax Rate (%)</label>
    <input class="form-control" type="number" step="0.01" name="tax_rate" value="{{ product.tax_rate if product else 0 }}" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Min Stock Threshold</label>
    <input class="form-control" type="number" name="min_threshold" value="{{ product.min_threshold if product else 5 }}" required>
  </div>

  <div class="col-md-4">
    <label class="form-label">Stock Quantity</label>
    <input class="form-control" type="number" name="stock_qty" value="{{ product.stock_qty if product else 0 }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Batch Number</label>
    <input class="form-control" name="batch_no" value="{{ product.batch_no if product else '' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Expiry Date</label>
    <input class="form-control" type="date" name="expiry_date"
           value="{{ product.expiry_date.isoformat() if product and product.expiry_date else '' }}">
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('inventory.list_products') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
