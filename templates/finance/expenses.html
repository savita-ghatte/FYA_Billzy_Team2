{% extends "base.html" %}
{% block title %}Expenses{% endblock %}
{% block content %}
<h3>Operational Expenses</h3>

<div class="card border-0 shadow-sm mb-4">
  <div class="card-body">
    <form method="POST" class="row g-2">
      <div class="col-md-3"><input class="form-control" name="category" placeholder="Category (Rent, Electricity...)" required></div>
      <div class="col-md-2"><input class="form-control" type="number" step="0.01" name="amount" placeholder="Amount (₹)" required></div>
      <div class="col-md-3"><input class="form-control" type="date" name="date"></div>
      <div class="col-md-3"><input class="form-control" name="note" placeholder="Note"></div>
      <div class="col-md-1"><button class="btn btn-primary w-100">Add</button></div>
    </form>
  </div>
</div>

<table class="table table-striped">
  <thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Note</th></tr></thead>
  <tbody>
    {% for e in expenses %}
    <tr>
      <td>{{ e.date }}</td>
      <td>{{ e.category }}</td>
      <td>₹{{ "%.2f"|format(e.amount) }}</td>
      <td>{{ e.note }}</td>
    </tr>
    {% else %}
    <tr><td colspan="4" class="text-muted">No expenses logged yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
